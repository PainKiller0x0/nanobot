<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reflexio 本地记忆</title>
<style>
:root{--bg:#f4f0e7;--card:#fffdf7;--text:#202018;--muted:#6f695d;--line:#ddd3c1;--accent:#b7662d;--accent2:#2f7f72;--ok:#16854e;--bad:#c43d32;--shadow:0 20px 60px rgba(82,56,24,.13)}
[data-theme="dark"]{--bg:#111816;--card:#1d2621;--text:#edf5ea;--muted:#a8b5a4;--line:#344139;--accent:#f0a35c;--accent2:#77c7b7;--ok:#76d39a;--bad:#ff8278;--shadow:0 22px 70px rgba(0,0,0,.34)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(860px 520px at -10% -10%,rgba(183,102,45,.22),transparent 58%),radial-gradient(760px 460px at 108% 0,rgba(47,127,114,.17),transparent 56%),var(--bg);color:var(--text);font-family:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:24px 16px 40px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px}.eyebrow{color:var(--accent2);font-size:12px;font-weight:900;letter-spacing:.16em}.title{font-family:Georgia,"Noto Serif SC",serif;font-size:42px;line-height:1.04;margin:8px 0 10px}.sub{color:var(--muted);line-height:1.75;margin:0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn,button{border:1px solid var(--line);border-radius:999px;padding:9px 13px;background:var(--text);color:var(--bg);font-weight:900;text-decoration:none;cursor:pointer}.secondary{background:transparent;color:var(--text)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{border:1px solid var(--line);border-radius:18px;padding:14px;background:rgba(255,255,255,.16)}.k{font-size:12px;color:var(--muted)}.v{font-size:28px;font-weight:950;letter-spacing:-.04em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.full{grid-column:1/-1}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.name{font-size:18px;font-weight:950}.muted{color:var(--muted)}.mini{font-size:12px;line-height:1.55}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.16)}.tag{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;color:var(--accent);font-weight:900}textarea,input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:rgba(255,255,255,.36);color:var(--text);font:inherit}textarea{min-height:108px;resize:vertical}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted)}.content{white-space:pre-wrap;line-height:1.6}.ok{color:var(--ok)}.bad{color:var(--bad)}@media(max-width:860px){.hero,.grid,.formgrid{grid-template-columns:1fr}.full{grid-column:auto}.title{font-size:33px}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="panel">
      <div class="eyebrow">LOCAL MEMORY</div>
      <h1 class="title">Reflexio 本地记忆</h1>
      <p class="sub">现在它先做一件确定有用的事：把你明确要求“记住”的内容落到本地 SQLite，并提供快速检索。默认不会把这部分记忆发送给外部 LLM 或 Embedding 服务。</p>
      <div class="toolbar"><a class="btn" href="/">回到驾驶舱</a><a class="btn secondary" href="/sidecars">能力总控</a><button class="secondary" onclick="toggleTheme()">明暗</button><button class="secondary" onclick="loadAll()">刷新</button></div>
    </div>
    <div class="panel"><div class="stats" id="stats"><div class="muted">加载中...</div></div></div>
  </section>

  <section class="grid">
    <article class="panel">
      <div class="row"><div><div class="name">写入一条记忆</div><div class="muted mini">等价 QQ：记住 我喜欢……</div></div><span class="tag">local</span></div>
      <textarea id="memoryContent" placeholder="例如：我偏好 Rust sidecar；网页尽量纯中文；不要轻易改 nanobot 本体。"></textarea>
      <div class="formgrid"><select id="memoryCategory"><option value="preference">偏好</option><option value="project">项目</option><option value="habit">习惯</option><option value="note">备注</option></select><input id="memorySource" value="dashboard" /></div>
      <button onclick="saveMemory()">记住</button><span id="saveStatus" class="mini muted" style="margin-left:10px"></span>
    </article>

    <article class="panel">
      <div class="row"><div><div class="name">搜索记忆</div><div class="muted mini">等价 QQ：查记忆 Rust sidecar</div></div><span class="tag">keyword</span></div>
      <input id="searchInput" placeholder="输入关键词，例如：Rust / 网页 / nanobot 本体" onkeydown="if(event.key==='Enter')searchMemory()" />
      <div style="margin-top:10px"><button onclick="searchMemory()">搜索</button></div>
      <div class="list" id="searchResults" style="margin-top:12px"></div>
    </article>

    <article class="panel full">
      <div class="row"><div><div class="name">最近本地记忆</div><div class="muted mini">只显示你明确保存的记忆，不包含完整聊天流水。</div></div><span class="tag" id="memoryCount">0</span></div>
      <div class="list" id="memories" style="margin-top:12px"></div>
    </article>

    <article class="panel">
      <div class="name">历史交互</div><div class="muted mini">旧 Reflexio 自动写入遗留数据；目前不再作为主记忆闭环。</div>
      <div id="interactions" style="margin-top:12px"></div>
    </article>
    <article class="panel">
      <div class="name">抽取事实</div><div class="muted mini">旧 LLM 抽取事实；当前先不自动外发内容。</div>
      <div id="facts" style="margin-top:12px"></div>
    </article>
  </section>
</div>
<script>
const root=document.documentElement;if(localStorage.reflexioTheme==='dark')root.setAttribute('data-theme','dark');
function toggleTheme(){const d=root.getAttribute('data-theme')==='dark';root.setAttribute('data-theme',d?'light':'dark');localStorage.reflexioTheme=d?'light':'dark'}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function getJson(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(url+' '+r.status);return r.json()}
async function postJson(url,payload){const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});if(!r.ok)throw new Error(url+' '+r.status);return r.json()}
function stat(k,v,n){return '<div class="stat"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div><div class="mini muted">'+esc(n||'')+'</div></div>'}
function item(x){return '<div class="item"><div class="row"><div><div class="name">'+esc(x.content)+'</div><div class="muted mini">'+esc(x.category||'-')+' · '+esc(x.source||'-')+' · '+esc(x.created_at||'-')+'</div></div><span class="tag">#'+esc(x.id)+'</span></div></div>'}
async function loadAll(){try{const all=await Promise.all([getJson('/api/stats'),getJson('/api/memories?limit=20'),getJson('/api/interactions'),getJson('/api/facts')]);const stats=all[0],memories=all[1],interactions=all[2],facts=all[3];document.getElementById('stats').innerHTML=stat('本地记忆',stats.total_memories||0,stats.latest_memory_at?'最新 '+stats.latest_memory_at:'等待第一条记忆')+stat('历史交互',stats.total_interactions||0,'旧链路记录')+stat('抽取事实',stats.total_facts||0,'旧 LLM 事实')+stat('模式','本地优先','手动写入，不自动外传');document.getElementById('memoryCount').textContent=memories.length;document.getElementById('memories').innerHTML=memories.length?memories.map(item).join(''):'<div class="muted">还没有本地记忆。你可以说：记住 我喜欢……</div>';document.getElementById('interactions').innerHTML=renderTable(interactions.slice(0,8),['id','content','created_at']);document.getElementById('facts').innerHTML=renderTable(facts.slice(0,8),['id','content','created_at']);}catch(e){document.getElementById('memories').innerHTML='<div class="bad">加载失败：'+esc(e.message)+'</div>'}}
function renderTable(rows,cols){if(!rows.length)return '<div class="muted">暂无</div>';return '<div style="overflow:auto"><table class="table"><thead><tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td class="content">'+esc(String(r[c]||'').slice(0,180))+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}
async function saveMemory(){const content=document.getElementById('memoryContent').value.trim();if(!content){document.getElementById('saveStatus').textContent='先写点内容';return}const payload={content,category:document.getElementById('memoryCategory').value,source:document.getElementById('memorySource').value||'dashboard',user_id:'dashboard'};try{const r=await postJson('/api/memories',payload);document.getElementById('saveStatus').textContent=r.success?'已记住 #'+r.id:'失败：'+r.msg;document.getElementById('memoryContent').value='';await loadAll();}catch(e){document.getElementById('saveStatus').textContent='失败：'+e.message}}
async function searchMemory(){const query=document.getElementById('searchInput').value.trim();try{const r=await postJson('/api/memory/search',{query,limit:12});document.getElementById('searchResults').innerHTML=r.results.length?r.results.map(item).join(''):'<div class="muted">没搜到。</div>'}catch(e){document.getElementById('searchResults').innerHTML='<div class="bad">搜索失败：'+esc(e.message)+'</div>'}}
loadAll();
</script>
</body>
</html>
